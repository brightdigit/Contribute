name: Contribute
on:
  push:
    branches: [main, brightdigit-com-260406]
    tags: ['v*.*.*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-ubuntu:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    container: swift:6.3-noble
    steps:
      - uses: actions/checkout@v6
      - uses: brightdigit/swift-build@v1

  build-macos:
    name: Build on macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: brightdigit/swift-build@v1

  lint:
    name: Linting
    needs: [build-ubuntu]
    runs-on: ubuntu-latest
    container: swift:6.3-noble
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        run: |
          apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Cache mise tools
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise/installs
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise.toml') }}
          restore-keys: |
            mise-${{ runner.os }}-${{ runner.arch }}-
      - name: Lint
        run: ./Scripts/lint.sh
        env:
          LINT_MODE: STRICT
